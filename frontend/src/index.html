<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitaria | Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1 class="log__title" id="main-title">Login</h1>
        <form id="form" class="form" action="" novalidate>

            <section id="login-section">
                <article class="form__group">
                    <input class="form__input" type="email" id="useremail" name="useremail" placeholder="Correo Electrónico" required>
                </article>

                <article class="form__group">
                    <div class="form__input-wrap">
                        <input class="form__input" type="password" id="password" name="password" placeholder="Contraseña" required>
                        <span class="form__input-icon" id="toggle-pwd">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>
                    <div class="form__strength">
                        <span class="form__strength-bar" id="s1"></span>
                        <span class="form__strength-bar" id="s2"></span>
                        <span class="form__strength-bar" id="s3"></span>
                        <span class="form__strength-bar" id="s4"></span>
                    </div>
                    <p class="form__hint">8-16 caracteres, mayúsculas, minúsculas y símbolos</p>
                </article>

                <p class="form__link" id="forgot-btn">¿Olvidaste tu contraseña?</p>

                <button class="form__button" type="submit" id="btn-login">Iniciar sesión</button>

                <p class="form__text">¿No tienes una cuenta? <a class="form__link" href="./pages/register.html">Regístrate aquí</a></p>
            </section>

            <section id="forgot-section" class="d-none">
                <p class="form__text form__text--recovery">
                    Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
                </p>

                <article class="form__group">
                    <input class="form__input" type="email" id="recovery-email" name="recovery-email" placeholder="Correo Electrónico">
                </article>

                <button class="form__button" type="button" id="btn-recover">Enviar instrucciones</button>

                <p class="form__text form__text--back">
                    <a class="form__link" id="back-login-btn">Volver al login</a>
                </p>
            </section>

        </form>
    </div>
    <script src="./js/login.js"></script>
</body>
</html>
