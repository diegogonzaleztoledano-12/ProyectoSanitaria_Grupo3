<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitaria | Búsqueda Cassettes</title>
    <!-- LINK CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <header class="header">
        <div class="container_header">

            <!-- MENÚ HAMBURGUESA -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- NAV -->
            <nav class="header__nav" id="menu">
                <!-- SELECCIONAR ÓRGANO -->
                <select class="header__form" id="organos" aria-label="Seleccionar un órgano">
                    <option disabled selected value="">Seleccionar un Órgano</option>
                    <option value="*">Todos</option>
                    <optgroup label="Sistema Nervioso">
                        <option value="encefalo">Encéfalo</option>
                        <option value="medula">Médula Espinal</option>
                        <option value="nervio">Nervio</option>
                        <option value="ganglio-nervios">Ganglio Nervios</option>
                    </optgroup>
                    <optgroup label="Tegumento">
                        <option value="piel">Piel</option>
                        <option value="una">Uña</option>
                        <option value="pelo">Pelo</option>
                    </optgroup>
                    <optgroup label="Cardiovascular">
                        <option value="corazon">Corazón</option>
                        <option value="venas">Venas</option>
                        <option value="arteria">Arteria</option>
                    </optgroup>
                    <optgroup label="Linfático">
                        <option value="ganglio-linfatico">Ganglio Linfático</option>
                        <option value="timo">Timo</option>
                        <option value="bazo">Bazo</option>
                    </optgroup>
                    <optgroup label="Sistema Digestivo">
                        <option value="lengua">Lengua</option>
                        <option value="esofago">Esófago</option>
                        <option value="estomago">Estómago</option>
                        <option value="intestino-delgado">Intestino Delgado</option>
                        <option value="intestino-grueso">Intestino Grueso</option>
                        <option value="diente">Diente</option>
                        <option value="glandula-salivar">Glándula Salivar</option>
                        <option value="pancrea">Páncrea</option>
                        <option value="higado">Hígado</option>
                    </optgroup>
                    <optgroup label="Aparato Excretor">
                        <option value="rinon">Riñón</option>
                        <option value="vejiga">Vejiga</option>
                    </optgroup>
                    <optgroup label="Respiratorio">
                        <option value="traquea">Tránquea</option>
                        <option value="bronquios">Bronquios</option>
                        <option value="tejido-respiratorio">Tejido Respiratorio</option>
                    </optgroup>
                    <optgroup label="Endocrino">
                        <option value="tiroides">Tiroides</option>
                        <option value="parotidas">Parótidas</option>
                        <option value="suprarrenales">Suprarrenales</option>
                        <option value="ovario">Ovario</option>
                        <option value="testiculo">Testículo</option>
                    </optgroup>
                    <optgroup label="Locomotor">
                        <option value="hueso">Hueso</option>
                        <option value="musculo">Musculo Esquelético</option>
                    </optgroup>
                    <option value="otros">Otros</option>
                </select>

                <!-- QR -->
                <button class="header__button" id="qr-button">
                    Escanear QR
                </button>

                <!-- FECHAS -->
                <section class="header__dates">
                    <select class="header__date-input" id="start-date" aria-label="Fecha inicio">
                        <option disabled selected value="">dd/mm/aaaa</option>
                    </select>
                    <select class="header__date-input" id="end-date" aria-label="Fecha fin">
                        <option disabled selected value="">dd/mm/aaaa</option>
                    </select>
                </section>
            </nav>
        </div>
    </header>
    <!-- JS -->
    <script src="../js/app.js"></script>
</body>
</html>
