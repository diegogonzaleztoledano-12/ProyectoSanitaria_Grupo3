<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitaria | Registro</title>
    <!-- LINK CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1 class="log__title">Registro</h1>
        <!-- FORMULARIO -->
        <form class="form" action="" novalidate>

            <!-- NOMBRE -->
            <article class="form__group">
                <input class="form__input" type="text" id="nombre" name="nombre" placeholder="Nombre" required minlength="2" maxlength="50" pattern="[A-Za-z\s]+">
                <p class="form__error-message" aria-live="polite"></p>
            </article>

            <!-- APELLIDOS -->
            <article class="form__group">
                <input class="form__input" type="text" id="apellidos" name="apellidos" placeholder="Apellidos" required minlength="2" maxlength="100" pattern="[A-Za-z\s]+">
                <p class="form__error-message" aria-live="polite"></p>
            </article>

            <!-- CENTRO -->
            <article class="form__group">
                <input class="form__input" type="text" id="centro" name="centro" placeholder="Centro" required minlength="2" maxlength="100">
                <p class="form__error-message" aria-live="polite"></p>
            </article>

            <!-- CORREO -->
            <article class="form__group">
                <input class="form__input" type="email" id="useremail" name="useremail" placeholder="Correo Electrónico" required>
                <p class="form__error-message" aria-live="polite"></p>
            </article>

            <!-- CONTRASEÑA -->
            <article class="form__group">
                <div class="form__input-wrap">
                    <input class="form__input" type="password" id="password" name="password" placeholder="Contraseña" required minlength="8" maxlength="16" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,16}">
                    <span class="form__input-icon" id="toggle-pwd">
                        <i class="fa-regular fa-eye"></i>
                    </span>
                </div>
                <p class="form__error-message" aria-live="polite"></p>
                <!-- Barras contraseña -->
                <div class="form__strength">
                    <span class="form__strength-bar" id="s1"></span>
                    <span class="form__strength-bar" id="s2"></span>
                    <span class="form__strength-bar" id="s3"></span>
                    <span class="form__strength-bar" id="s4"></span>
                </div>
                <p class="form__hint">8-16 caracteres, mayúsculas, minúsculas y símbolos</p>
            </article>

            <!-- REPETIR CONTRASEÑA -->
            <article class="form__group">
                <div class="form__input-wrap">
                    <input class="form__input" type="password" id="password2" name="password2" placeholder="Repetir Contraseña" required>
                    <span class="form__input-icon" id="toggle-pwd2">
                        <i class="fa-regular fa-eye"></i>
                    </span>
                </div>
                <p class="form__error-message" aria-live="polite"></p>
                <p class="form__hint">8-16 caracteres, mayúsculas, minúsculas y símbolos</p>
            </article>

            <!-- REGISTER BUTTON -->
            <button class="form__button" type="submit" id="btn-register">Registrarse</button>

            <!-- LOGIN -->
            <p class="form__text">¿Ya tienes una cuenta? <a class="form__link" href="../index.html">Inicia sesión aquí</a></p>
        </form>
    </div>
    <!-- LINK JS -->
    <script src="../js/register.js"></script>
</body>
</html>
